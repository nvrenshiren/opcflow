name: 功能请求
description: 提一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你遇到的痛点 / 场景是什么?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 设想的方案
      description: 你希望它怎么工作
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其它做法(可选)
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、相关 issue、参考链接等(可选)
